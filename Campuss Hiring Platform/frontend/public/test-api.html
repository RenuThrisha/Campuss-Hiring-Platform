<!DOCTYPE html>
<html>

<head>
    <title>API Test - Pending Students</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>
    <h1>Pending Students API Test</h1>

    <div class="section">
        <h2>Step 1: Login</h2>
        <input type="email" id="email" value="vcf@gmail.com" placeholder="Email">
        <input type="password" id="password" value="vcf123" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="loginResult"></div>
    </div>

    <div class="section">
        <h2>Step 2: Fetch Pending Students</h2>
        <button onclick="fetchPendingStudents()">Fetch Pending Students</button>
        <div id="studentsResult"></div>
    </div>

    <script>
        let token = localStorage.getItem('token');

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('loginResult');

            try {
                const response = await fetch('http://localhost:5000/api/auth/college/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    resultDiv.innerHTML = `<p class="success">✓ Login successful!</p>
                        <p>Role: ${data.user.role}</p>
                        <p>Name: ${data.user.name}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<p class="error">✗ Login failed: ${data.message}</p>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<p class="error">✗ Error: ${err.message}</p>`;
            }
        }

        async function fetchPendingStudents() {
            const resultDiv = document.getElementById('studentsResult');

            if (!token) {
                resultDiv.innerHTML = '<p class="error">Please login first!</p>';
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/college/students/pending', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    const students = data.pendingStudents || [];
                    resultDiv.innerHTML = `<p class="success">✓ Found ${students.length} pending students</p>
                        <h3>Students:</h3>
                        <ul>
                            ${students.slice(0, 10).map(s => `
                                <li>${s.name} (${s.rollNo}) - ${s.department}, Year ${s.year}</li>
                            `).join('')}
                            ${students.length > 10 ? `<li><em>...and ${students.length - 10} more</em></li>` : ''}
                        </ul>
                        <details>
                            <summary>View Full JSON Response</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>`;
                } else {
                    resultDiv.innerHTML = `<p class="error">✗ Failed: ${data.message}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<p class="error">✗ Error: ${err.message}</p>`;
            }
        }

        // Auto-load token if exists
        if (token) {
            document.getElementById('loginResult').innerHTML = '<p class="success">Token found in localStorage</p>';
        }
    </script>
</body>

</html>
